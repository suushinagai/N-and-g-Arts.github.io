<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Virgo Cluster Map</title>
  <script src="https://aladin.u-strasbg.fr/AladinLite/api/v3/latest/aladin.js"></script>
</head>
<body>

<div id="aladin-lite-div" style="width:100%;height:600px;"></div>

<script>
window.onload = function() {

  var aladin = A.aladin('#aladin-lite-div', {
      survey: "P/DSS2/color",
      fov: 30,
      target: "12:38:35.127 +12:51:10.61"
  });

  // 銀河カタログ
  aladin.addCatalog(A.catalogFromVizieR(
    "VII/118/ngc2000",
    "NGC",
    {color: 'red'}
  ));

  // マーカー＋画像ポップアップ
  var marker = A.marker(189.6463625, 12.852947, {
    popupTitle: "Virgo Cluster",
    popupDesc: "<img src='https://cdn-ak.f.st-hatena.com/images/fotolife/s/suushinagai/20260318/20260318151508.jpg' width='400'>"
  });

  var overlay = A.graphicOverlay({color: 'yellow'});
  aladin.addOverlay(overlay);
  overlay.add(marker);

};
</script>

</body>
</html>
