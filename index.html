<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Virgo Cluster Map</title>
  <script src="https://aladin.u-strasbg.fr/AladinLite/api/v3/latest/aladin.js"></script>
</head>
<body>
<div id="aladin-lite-div" style="width:100%;height:600px;"></div>

<script>
window.onload = function() {

  var aladin = A.aladin('#aladin-lite-div', {
      survey: "P/DSS2/color",
      fov: 10,
      target: "189.6463625 12.852947"
  });

  var cat = A.catalog({
    name: "My Objects",
    sourceSize: 20,
    color: 'red'
  });
  aladin.addCatalog(cat);

  var obj = A.source(
    189.6463625,
    12.852947,
    {
      data: {
        name: "Virgo Cluster",
        description: "<img src='https://cdn-ak.f.st-hatena.com/images/fotolife/s/suushinagai/20260318/20260318151508.jpg' width='400'>"
      }
    }
  );

  cat.addSources([obj]);

  aladin.on('objectClicked', function(obj) {
      if (obj) {
          aladin.showPopup(obj);
      }
  });

};
</script>
</body>
</html>
