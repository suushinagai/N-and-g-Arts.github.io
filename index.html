<div id="aladin-lite-div" style="width:100%;height:600px;"></div>

<script>
window.onload = function() {

  var aladin = A.aladin('#aladin-lite-div', {
      survey: "P/DSS2/color",
      fov: 10,
      target: "189.6463625 12.852947",
      showPopup: true
  });

  var cat = A.catalog({
    name: "My Objects",
    sourceSize: 20,
    color: 'red'
  });
  aladin.addCatalog(cat);

  var obj = A.source(
    189.6463625,
    12.852947,
    {
      popupTitle: "Virgo Cluster",
      popupDesc: "<img src='https://cdn-ak.f.st-hatena.com/images/fotolife/s/suushinagai/20260318/20260318151508.jpg' width='400'>"
    }
  );

  cat.addSources([obj]);

  // ★これが決定打
  aladin.on('objectClicked', function(obj) {
      if (obj) {
          aladin.showPopup(obj);
      }
  });

};
</script>
