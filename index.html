<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Virgo Cluster Map</title>
  <script src="https://aladin.u-strasbg.fr/AladinLite/api/v3/latest/aladin.js"></script>
</head>
<body>
<div id="aladin-lite-div" style="width:100%;height:600px;"></div>

<div id="info" style="margin-top:10px; color:white;"></div>
<script>
window.onload = function() {

  var aladin = A.aladin('#aladin-lite-div', {
      survey: "P/DSS2/color",
      fov: 10,
      target: "189.6463625 12.852947"
  });

  var cat = A.catalog({
    name: "My Objects",
    sourceSize: 20,
    color: 'red'
  });
  aladin.addCatalog(cat);

  var obj = A.source(
    189.6463625,
    12.852947,
    {
      data: {
        name: "Virgo Cluster",
        description: "<img src='https://cdn-ak.f.st-hatena.com/images/fotolife/s/suushinagai/20260318/20260318151508.jpg' width='400'>"
      }
    }
  );

  cat.addSources([obj]);

  // ★ここが決定打
  aladin.on('objectClicked', function(o) {
      if (o) {
 document.getElementById("info").innerHTML =
  "<div style='text-align:center; background:black; padding:20px;'>" +
  "<h3 style='color:white;'>Virgo Cluster</h3>" +
  "<img src='https://cdn-ak.f.st-hatena.com/images/fotolife/s/suushinagai/20260318/20260318151508.jpg' style='max-width:90%; height:auto; border:1px solid #444;'>" +
  "</div>";
      }
  });


};
</script>
</body>
</html>
