<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Virgo Cluster Map</title>
  <script src="https://aladin.u-strasbg.fr/AladinLite/api/v3/latest/aladin.js"></script>
</head>
<body>

<div id="aladin-lite-div" style="width:100%;height:600px; background:black;"></div>

<script>
window.onload = function() {
  var aladin = A.aladin('#aladin-lite-div', {
      survey: "P/DSS2/color",
      fov: 30,
      target: "12:38:35.127 +12:51:10.61"
  });
  // あなたの画像をオーバーレイ表示
var img = A.image({
    name: "Virgo Cluster",
    url: "https://cdn-ak.f.st-hatena.com/images/fotolife/s/suushinagai/20260318/20260318151508.jpg",
    ra: 189.6463625,
    dec: 12.852947,
    fov: 26.063,
    rotation: 0
});

aladin.addImage(img);
};
</script>

</body>
</html>
